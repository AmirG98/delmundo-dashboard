name: Update Meta Ads Metrics

on:
  # Ejecutar automáticamente cada día a las 9 AM UTC
  schedule:
    - cron: '0 9 * * *'

  # Permitir ejecución manual desde GitHub UI
  workflow_dispatch:

  # Ejecutar en cada push a main (opcional, puedes comentar si no lo necesitas)
  push:
    branches:
      - main
    paths:
      - 'meta_metrics_exporter.py'
      - '.github/workflows/update-metrics.yml'

jobs:
  update-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Export metrics from Meta API
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
        run: |
          # Crear archivo .env con las credenciales
          echo "META_ACCESS_TOKEN=${META_ACCESS_TOKEN}" > .env
          echo "META_AD_ACCOUNT_ID=${META_AD_ACCOUNT_ID}" >> .env

          # Ejecutar el script de exportación
          python meta_metrics_exporter.py

          # Eliminar .env por seguridad
          rm .env

      - name: Commit and push updated metrics
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Agregar solo los archivos JSON de métricas
          git add dashboard/data/*.json

          # Commit solo si hay cambios
          git diff --staged --quiet || git commit -m "🤖 Auto-update metrics - $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

          # Push a la rama main
          git push

      - name: Summary
        if: success()
        run: |
          echo "✅ Metrics updated successfully!"
          echo "📊 Dashboard will be updated at GitHub Pages"
          echo "🕐 Next automatic update: Tomorrow at 9 AM UTC"
